services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment: ["PUID=${PUID}", "PGID=${PGID}", "TZ=${TZ}"]
    volumes:
      - ${CONFIG}/jellyfin:/config
      - ${DATA}/media:/media
      # Self-hosted web fonts (Palm Canyon Drive wordmark, Poppins) + their @font-face CSS live in
      # jellyfin-web's /usr/share/jellyfin/web/fonts — which is baked into the image, NOT the /config
      # volume. Without this bind mount, every `docker compose pull` of :latest recreates the
      # container from a clean layer and wipes them (reboots are fine — same container restarts).
      # Provision (§6a) populates this host dir; the mount makes the files durable across image updates.
      - ${CONFIG}/jellyfin-web/fonts:/usr/share/jellyfin/web/fonts
    # Host networking so the PS4 can discover Jellyfin over DLNA/SSDP (UDP 1900 multicast doesn't
    # cross Docker's bridge). Jellyfin still serves on the NUC's IP :8096 exactly as before — only
    # internal container refs changed (now reach it at ${NUC_IP}:8096, not the 'jellyfin' DNS name).
    # LAN-only; nothing new is exposed to the internet.
    network_mode: host
    # Intel Quick Sync: pass the iGPU (Iris 540) so Jellyfin transcodes/analyses on the GPU
    # instead of pegging the CPU. group_add = host render(133)+video(44) gids so the container
    # user can open /dev/dri/renderD128.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "133"
      - "44"
    # CPU: no hard cap — playback + (software) transcode must be free to grab all 4 cores. The
    # high cpu_shares weight means that WHEN the box is contended, Jellyfin wins over the *arr
    # background work below. See the capped background apps for the rationale.
    cpu_shares: 1024
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment: ["PUID=${PUID}", "PGID=${PGID}", "TZ=${TZ}", "WEBUI_PORT=8080"]
    volumes:
      - ${CONFIG}/qbittorrent:/config
      - ${DATA}:/data
    ports: ["0.0.0.0:8080:8080", "0.0.0.0:6881:6881", "0.0.0.0:6881:6881/udp"]
    cpu_shares: 512
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment: ["PUID=${PUID}", "PGID=${PGID}", "TZ=${TZ}"]
    volumes: ["${CONFIG}/prowlarr:/config"]
    ports: ["0.0.0.0:9696:9696"]
    cpu_shares: 128
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment: ["PUID=${PUID}", "PGID=${PGID}", "TZ=${TZ}"]
    volumes:
      - ${CONFIG}/radarr:/config
      - ${DATA}:/data
    ports: ["0.0.0.0:7878:7878"]
    # CPU cap: bound the worst case so a library refresh / import ffprobe can't peg all 4 cores
    # and stutter Jellyfin. 1.5 cores is plenty for normal import throughput; the low cpu_shares
    # means it yields to Jellyfin/qBittorrent under contention. Tune `cpus` up if imports feel slow.
    cpus: 1.5
    cpu_shares: 256
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment: ["PUID=${PUID}", "PGID=${PGID}", "TZ=${TZ}"]
    volumes:
      - ${CONFIG}/sonarr:/config
      - ${DATA}:/data
    ports: ["0.0.0.0:8989:8989"]
    # CPU cap — see radarr above. Sonarr's per-series refresh/analysis is the heavier of the two,
    # so the same 1.5-core bound keeps a background scan from crushing playback.
    cpus: 1.5
    cpu_shares: 256
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment: ["PUID=${PUID}", "PGID=${PGID}", "TZ=${TZ}"]
    volumes:
      - ${CONFIG}/bazarr:/config
      - ${DATA}:/data
    ports: ["0.0.0.0:6767:6767"]
    # CPU cap: subtitle scoring/scans are bursty and non-urgent — 1 core is ample.
    cpus: 1.0
    cpu_shares: 128
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment: ["LOG_LEVEL=info", "TZ=${TZ}"]
    ports: ["0.0.0.0:8191:8191"]
    # CPU cap: FlareSolverr spins up a headless Chrome per challenge — cap it so a Cloudflare
    # solve can't spike playback.
    cpus: 1.0
    cpu_shares: 128
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    environment: ["TZ=${TZ}", "LOG_LEVEL=info"]
    volumes: ["${CONFIG}/jellyseerr:/app/config"]
    ports: ["0.0.0.0:5055:5055"]
    cpu_shares: 128
    restart: unless-stopped

  # SuggestArr — recommendation engine: reads Jellyfin watch history, finds similar titles
  # via TMDb, and files them as Jellyseerr REQUESTS. NOTHING AUTO-DOWNLOADS: the wizard must
  # use the dedicated 'suggestarr' Jellyseerr user (request-only, provisioned by
  # jellyseerr.sh), so every suggestion sits in "Pending approval" until Brennan approves or
  # declines it — an inbox, not a downloader. One-time setup wizard at :5000 (needs a free
  # TMDb API key + Jellyfin/Jellyseerr URLs and keys); config persists in ${CONFIG}/suggestarr.
  suggestarr:
    image: ciuse99/suggestarr:latest
    container_name: suggestarr
    environment: ["TZ=${TZ}", "LOG_LEVEL=info", "SUGGESTARR_PORT=5000"]
    volumes: ["${CONFIG}/suggestarr:/app/config/config_files"]
    ports: ["0.0.0.0:5000:5000"]
    cpu_shares: 128
    restart: unless-stopped

  # Tailscale — joins this NUC to the family MESH network (a self-hosted Headscale
  # coordination server run by Brennan's father at ${TS_LOGIN_SERVER}). Purpose: let
  # family members reach THIS box's services (Jellyfin :8096, controller :80, …) from
  # anywhere over the private mesh, exactly as the family SETUP-GUIDE describes
  # (http://<NUC_MESH_IP>:8096). Nothing is exposed to the public internet — the mesh
  # is a private, key-gated overlay.
  #
  # Why host networking + KERNEL mode (not a gluetun-style sidecar namespace):
  #   • Jellyfin already runs network_mode: host (for DLNA/SSDP), so it can't join a
  #     container's netns. Instead we put Tailscale itself on the host network and run
  #     it in kernel mode (TS_USERSPACE=false + /dev/net/tun + NET_ADMIN/NET_RAW). That
  #     creates a real `tailscale0` interface IN THE HOST namespace, so the NUC gets one
  #     100.x.x.x mesh IP and EVERY host-published port answers on it automatically —
  #     no per-service proxying, no subnet-router route approval needed.
  #   • State (node key/identity) persists in ${CONFIG}/tailscale so a restart re-uses
  #     the same machine instead of re-registering. The pre-auth key is only consumed
  #     on first login.
  # Fail-safe: if TS_AUTHKEY is blank/expired the container just fails to authenticate
  # and retries — it never touches the other services or the host's normal LAN routing.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ${TS_HOSTNAME:-haleiwa-movies}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      # --login-server points at the family Headscale server (NOT Tailscale's SaaS).
      # --accept-routes lets this node use any subnet routes the father advertises.
      - TS_EXTRA_ARGS=--login-server=${TS_LOGIN_SERVER} --accept-routes
      - TS_HOSTNAME=${TS_HOSTNAME:-haleiwa-movies}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # Put the control socket on a shared volume (default lives in /tmp, un-shareable) so the
      # tailscale-status sidecar can query the daemon. NOTE: relocating the socket means any
      # `docker exec tailscale tailscale …` CLI call must pass --socket=/run/tailscale/tailscaled.sock.
      - TS_SOCKET=/run/tailscale/tailscaled.sock
    volumes:
      - ${CONFIG}/tailscale:/var/lib/tailscale
      - ts-sock:/run/tailscale
    restart: unless-stopped

  # tailscale-status — publishes the mesh's live state to the dashboard. It's a plain CLIENT of the
  # daemon the `tailscale` service runs (talks over the shared socket volume; runs as root so it can
  # read the root-owned socket) — it NEVER starts a second daemon (entrypoint overridden to a shell
  # loop). Writes `tailscale status --json` to the controller's config dir every 20s; the controller
  # serves it at /api/tailscale and the Home screen renders it as the "Mesh" tile. Purely cosmetic:
  # if this sidecar is down the mesh itself is unaffected — only the dashboard tile goes stale.
  tailscale-status:
    image: tailscale/tailscale:latest
    container_name: tailscale-status
    depends_on: [tailscale]
    volumes:
      - ts-sock:/run/tailscale
      - ${CONFIG}/controller:/status
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          tailscale --socket=/run/tailscale/tailscaled.sock status --json > /status/tailscale-status.json.tmp 2>/dev/null \
            && mv /status/tailscale-status.json.tmp /status/tailscale-status.json \
            || echo '{}' > /status/tailscale-status.json
          sleep 20
        done
    restart: unless-stopped

  # Web controller — mobile dashboard + same-origin API that aggregates the stack
  # and runs the one-click "delete everywhere" recipe. Keys are wired by
  # scripts/provision/controller.sh into ${CONFIG}/controller/keys.env (read at
  # startup); it starts degraded until provisioned. /data is read-only (disk stat
  # only — all deletion goes through the apps' APIs).
  controller:
    build: ./controller
    container_name: controller
    environment: ["TZ=${TZ}", "CONTROLLER_PORT=${CONTROLLER_PORT:-8088}", "NUC_IP=${NUC_IP}", "QBIT_HOST=${QBIT_HOST:-qbittorrent}"]
    volumes:
      - ${CONFIG}/controller:/config
      - ${DATA}:/data:ro
    # Published on :80 so the dashboard has a clean, no-port URL (http://<hostname>),
    # plus :8088 kept for compatibility / direct access.
    ports: ["0.0.0.0:80:${CONTROLLER_PORT:-8088}", "0.0.0.0:${CONTROLLER_PORT:-8088}:${CONTROLLER_PORT:-8088}"]
    restart: unless-stopped
    depends_on: [jellyfin, qbittorrent, radarr, sonarr, jellyseerr]

# Shared control socket between the tailscale daemon and its status sidecar (see above).
volumes:
  ts-sock:

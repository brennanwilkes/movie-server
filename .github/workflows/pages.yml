name: Deploy controller UI to GitHub Pages

# Publishes the static frontend (controller/web/) as a public launcher: deep-link
# tiles to the LAN services + a button to the live dashboard. Live data/delete only
# work from the NUC-served copy at http://<NUC_IP>:8088 (an HTTPS Pages origin can't
# reach the LAN over http) — off-network the page shows a graceful banner.
on:
  push:
    branches: [main]
    paths:
      - 'controller/web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: controller/web
      - id: deployment
        uses: actions/deploy-pages@v4
